name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Test
        run: mvn -B test

      - name: Package
        run: mvn -B -DskipTests package

      - name: Smoke CLI
        run: |
          java -jar target/langstitch-spring-ai-*-SNAPSHOT-all.jar version
          java -jar target/langstitch-spring-ai-*-SNAPSHOT-all.jar capabilities
